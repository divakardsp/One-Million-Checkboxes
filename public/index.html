<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>One Million Checkboxes</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            :root {
                color-scheme: dark;
                --bg-primary: #08111f;
                --bg-secondary: rgba(13, 19, 31, 0.78);
                --bg-surface: #111827;
                --bg-panel: rgba(15, 23, 42, 0.82);
                --text-primary: #f8fafc;
                --text-secondary: #94a3b8;
                --border-color: rgba(148, 163, 184, 0.18);
                --border-strong: rgba(148, 163, 184, 0.28);
                --accent-color: #60a5fa;
                --shadow-color: rgba(0, 0, 0, 0.45);
                --checkbox-bg: #0f172a;
                --checkbox-border: rgba(148, 163, 184, 0.28);
                --checkbox-hover: #172033;
                --checkbox-checked: linear-gradient(135deg, #3b82f6, #22c55e);
                --checkbox-mark: #e2e8f0;
            }

            body {
                min-height: 100vh;
                padding: 28px;
                color: var(--text-primary);
                font-family:
                    Inter,
                    ui-sans-serif,
                    system-ui,
                    -apple-system,
                    BlinkMacSystemFont,
                    "Segoe UI",
                    sans-serif;
                background:
                    radial-gradient(
                        circle at top left,
                        rgba(96, 165, 250, 0.18),
                        transparent 28%
                    ),
                    radial-gradient(
                        circle at top right,
                        rgba(124, 58, 237, 0.14),
                        transparent 22%
                    ),
                    linear-gradient(
                        180deg,
                        var(--bg-primary),
                        color-mix(in srgb, var(--bg-primary) 86%, #000000 14%)
                    );
                transition:
                    background-color 0.35s ease,
                    color 0.35s ease;
                overflow-x: hidden;
            }

            body::before {
                content: "";
                position: fixed;
                inset: 0;
                pointer-events: none;
                background-image:
                    linear-gradient(
                        rgba(255, 255, 255, 0.03) 1px,
                        transparent 1px
                    ),
                    linear-gradient(
                        90deg,
                        rgba(255, 255, 255, 0.03) 1px,
                        transparent 1px
                    );
                background-size: 32px 32px;
                mask-image: linear-gradient(
                    180deg,
                    rgba(0, 0, 0, 0.35),
                    transparent 75%
                );
                opacity: 0.35;
            }

            .header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 16px;
                max-width: 1200px;
                margin: 0 auto 28px;
                padding: 18px 22px;
                border: 1px solid var(--border-color);
                border-radius: 22px;
                background: var(--bg-panel);
                box-shadow: 0 18px 40px var(--shadow-color);
                backdrop-filter: blur(18px);
            }

            h1 {
                font-size: clamp(2rem, 4vw, 3rem);
                line-height: 1;
                letter-spacing: -0.04em;
                font-weight: 800;
                background: linear-gradient(
                    135deg,
                    var(--accent-color),
                    #8b5cf6 55%,
                    var(--text-primary)
                );
                -webkit-background-clip: text;
                background-clip: text;
                -webkit-text-fill-color: transparent;
            }

            .theme-toggle {
                appearance: none;
                border: 1px solid var(--border-strong);
                border-radius: 999px;
                padding: 12px 18px;
                background: linear-gradient(
                    180deg,
                    var(--bg-surface),
                    var(--bg-secondary)
                );
                color: var(--text-primary);
                cursor: default;
                font-size: 0.95rem;
                font-weight: 700;
                letter-spacing: 0.01em;
                box-shadow: 0 12px 28px var(--shadow-color);
            }

            .container {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(38px, 1fr));
                gap: 12px;
                max-width: 1200px;
                margin: 0 auto;
                padding: 22px;
                border: 1px solid var(--border-color);
                border-radius: 24px;
                background: var(--bg-panel);
                box-shadow: 0 24px 60px var(--shadow-color);
                backdrop-filter: blur(18px);
            }

            input[type="checkbox"] {
                width: 26px;
                height: 26px;
                margin: 0;
                appearance: none;
                -webkit-appearance: none;
                border: 1.5px solid var(--checkbox-border);
                border-radius: 7px;
                background: var(--checkbox-bg);
                box-shadow:
                    inset 0 1px 0 rgba(255, 255, 255, 0.08),
                    0 4px 10px rgba(15, 23, 42, 0.08);
                display: grid;
                place-items: center;
                cursor: pointer;
                transition:
                    transform 0.18s ease,
                    background-color 0.18s ease,
                    border-color 0.18s ease,
                    box-shadow 0.18s ease;
            }

            input[type="checkbox"]::before {
                content: "";
                width: 6px;
                height: 11px;
                border-right: 2px solid transparent;
                border-bottom: 2px solid transparent;
                transform: translateY(-1px) rotate(45deg);
                opacity: 0;
                transition: opacity 0.15s ease;
            }

            input[type="checkbox"]:hover {
                transform: translateY(-1px) scale(1.05);
                border-color: var(--accent-color);
                background: var(--checkbox-hover);
                box-shadow: 0 8px 16px var(--shadow-color);
            }

            input[type="checkbox"]:checked {
                background: var(--checkbox-checked);
                border-color: transparent;
                box-shadow: 0 10px 18px
                    color-mix(in srgb, var(--accent-color) 28%, transparent);
            }

            input[type="checkbox"]:checked::before {
                opacity: 1;
                border-right-color: var(--checkbox-mark);
                border-bottom-color: var(--checkbox-mark);
            }

            input[type="checkbox"]:focus-visible {
                outline: 3px solid
                    color-mix(in srgb, var(--accent-color) 40%, white 60%);
                outline-offset: 3px;
            }

            input[type="checkbox"]:active {
                transform: scale(0.97);
            }

            @media (max-width: 720px) {
                body {
                    padding: 16px;
                }

                .header {
                    flex-direction: column;
                    align-items: flex-start;
                    padding: 16px;
                    margin-bottom: 18px;
                }

                .container {
                    padding: 16px;
                    gap: 10px;
                    grid-template-columns: repeat(auto-fill, minmax(32px, 1fr));
                }

                input[type="checkbox"] {
                    width: 24px;
                    height: 24px;
                }
            }
        </style>
    </head>
    <body>
        <div class="header">
            <h1>✓ Checkboxes</h1>
        </div>
        <div class="container"></div>
        <script src="/socket.io/socket.io.js"></script>
        <script>
            const socket = io();
            const container = document.getElementsByClassName("container")[0];

            socket.on("server:checkbox-change", (data) => {
                const checkbox = document.getElementById(`checkbox-${data.index}`);
                checkbox.checked = data.checked
            })


            function loadCheckboxes() {
                fetch("/checkboxes")
                    .then((res) => res.json())
                    .then((data) => {
                        const checkboxes = data.checkboxes;

                        checkboxes.forEach((checkboxState, index) => {
                            const input = document.createElement("input");
                            input.type = "checkbox";
                            input.id = `checkbox-${index}`;
                            input.checked = checkboxState;
                            input.addEventListener("change", (e) => {
                                const checked = e.target.checked;
                                socket.emit("client:checkbox-change", {
                                    index,
                                    checked,
                                });
                            });

                            container.appendChild(input);
                        });
                    })
                    .catch((err) =>
                        console.error("Failed to fetch checkboxes:", err),
                    );
            }


            window.addEventListener("load", loadCheckboxes);
        </script>
        </script>
    </body>
</html>
